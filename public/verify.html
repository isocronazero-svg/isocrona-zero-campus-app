<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validacion de diploma</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body { padding: 24px; }
      .verify-shell { max-width: 840px; margin: 0 auto; }
      .verify-card { padding: 24px; }
    </style>
  </head>
  <body>
    <main class="verify-shell">
      <section class="panel verify-card">
        <p class="eyebrow">Validacion publica</p>
        <h1>Comprobar diploma</h1>
        <form id="verifyForm" class="stack">
          <label class="inline-field">
            Codigo del diploma
            <input id="codeInput" placeholder="IZ-2026-1-1" />
          </label>
          <div class="chip-row">
            <button class="primary-button" type="submit">Validar</button>
          </div>
        </form>
      </section>

      <section class="panel verify-card" id="resultCard">
        <p class="muted">Introduce un codigo para comprobar si el diploma existe en el campus.</p>
      </section>
    </main>

    <script>
      const form = document.getElementById("verifyForm");
      const input = document.getElementById("codeInput");
      const resultCard = document.getElementById("resultCard");
      const params = new URLSearchParams(window.location.search);
      const initialCode = params.get("code") || "";
      input.value = initialCode;

      if (initialCode) {
        validateCode(initialCode);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const code = input.value.trim();
        if (!code) {
          return;
        }
        await validateCode(code);
      });

      async function validateCode(code) {
        renderLoading();

        try {
          const response = await fetch(`/api/verify?code=${encodeURIComponent(code)}`);
          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || "No encontrado");
          }

          const diploma = payload.diploma;
          renderDiplomaResult(diploma);
        } catch (error) {
          renderNotFound();
        }
      }

      function createTextElement(tagName, text, className = "") {
        const element = document.createElement(tagName);
        if (className) {
          element.className = className;
        }
        element.textContent = String(text ?? "");
        return element;
      }

      function replaceResultContent(...children) {
        resultCard.textContent = "";
        children.forEach((child) => resultCard.appendChild(child));
      }

      function renderLoading() {
        replaceResultContent(createTextElement("p", "Buscando diploma...", "muted"));
      }

      function renderDiplomaResult(diploma = {}) {
        const tableWrapper = document.createElement("div");
        tableWrapper.className = "table-card";
        const table = document.createElement("table");
        const tbody = document.createElement("tbody");
        [
          ["Codigo", diploma.code],
          ["Alumno", diploma.memberName],
          ["Curso", diploma.courseTitle],
          ["Tipo", diploma.courseType],
          ["Fin", diploma.endDate],
          ["Horas", diploma.hours]
        ].forEach(([label, value]) => {
          const row = document.createElement("tr");
          row.appendChild(createTextElement("td", label));
          row.appendChild(createTextElement("td", value));
          tbody.appendChild(row);
        });
        table.appendChild(tbody);
        tableWrapper.appendChild(table);

        replaceResultContent(
          createTextElement("p", "Resultado", "eyebrow"),
          createTextElement("h2", "Diploma valido"),
          tableWrapper
        );
      }

      function renderNotFound() {
        replaceResultContent(
          createTextElement("p", "Resultado", "eyebrow"),
          createTextElement("h2", "Diploma no encontrado"),
          createTextElement("p", "No existe un diploma registrado con ese codigo en este campus.", "muted")
        );
      }
    </script>
  </body>
</html>
