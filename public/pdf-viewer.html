<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visor PDF | Isocrona Zero</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f1e8;
        --panel: rgba(255, 252, 247, 0.96);
        --border: rgba(140, 49, 20, 0.14);
        --ink: #23150f;
        --muted: #775b4b;
        --accent: #b64926;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        color: var(--ink);
        background: linear-gradient(180deg, #efe5d7 0%, #f8f4ee 100%);
      }

      .viewer-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .viewer-head {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        background: rgba(255, 251, 245, 0.94);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border);
      }

      .viewer-title {
        min-width: 0;
      }

      .viewer-title p {
        margin: 0 0 4px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .viewer-title strong {
        display: block;
        font-size: 24px;
        line-height: 1.2;
        word-break: break-word;
      }

      .viewer-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .viewer-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--ink);
        text-decoration: none;
        background: white;
        font-weight: 600;
      }

      .viewer-main {
        flex: 1;
        padding: 20px;
      }

      .viewer-state {
        margin: 0 auto;
        max-width: 960px;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--muted);
      }

      .viewer-pages {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }

      .viewer-page {
        width: min(100%, 960px);
        padding: 18px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: 0 18px 40px rgba(48, 30, 17, 0.08);
      }

      .viewer-page-meta {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .viewer-canvas {
        width: 100%;
        height: auto;
        display: block;
        border-radius: 12px;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="viewer-shell">
      <header class="viewer-head">
        <div class="viewer-title">
          <p>Visor del campus</p>
          <strong id="viewerTitle">Documento PDF</strong>
        </div>
        <div class="viewer-actions">
          <a id="viewerDownload" class="viewer-button" href="#" download>Descargar</a>
        </div>
      </header>
      <main class="viewer-main">
        <div id="viewerState" class="viewer-state">Cargando documento...</div>
        <div id="viewerPages" class="viewer-pages" hidden></div>
      </main>
    </div>
    <script type="module" src="/pdf-viewer.js"></script>
  </body>
</html>
