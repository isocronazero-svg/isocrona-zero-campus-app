name: App checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: app-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    name: Run app safety and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full app safety checks
        run: npm run check:app

      - name: Start app server for smoke checks
        run: |
          npm run start:local > /tmp/isocrona-campus.log 2>&1 &
          echo $! > /tmp/isocrona-campus.pid
          for i in {1..30}; do
            if curl --silent --fail http://localhost:3210/healthz > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server did not become ready in time"
          cat /tmp/isocrona-campus.log
          exit 1

      - name: Run campus smoke checks
        run: npm run smoke:campus-test

      - name: Stop app server
        if: always()
        run: |
          if [ -f /tmp/isocrona-campus.pid ]; then
            kill $(cat /tmp/isocrona-campus.pid) || true
          fi
