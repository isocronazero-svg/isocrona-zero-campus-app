name: App checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: app-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    name: Run app safety and smoke checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run full app safety checks
        run: npm run check:app

      - name: Run campus smoke checks
        run: npm run smoke:campus-test
