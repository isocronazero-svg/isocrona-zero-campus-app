services:
  - type: web
    name: isocrona-zero-campus-test
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 3210
      - key: IZ_BASE_URL
        sync: false
      - key: IZ_DATA_DIR
        value: /var/data/isocrona-zero
      - key: IZ_ASSOCIATE_SELF_EDIT_DAYS
        value: 30
      - key: AUTOMATION_INTERVAL_MS
        value: 300000
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disks:
      - name: campus-data
        mountPath: /var/data/isocrona-zero
        sizeGB: 5
